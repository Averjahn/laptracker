<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX · Трекер кругов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10; --bg2:#0f131a; --panel:#141922; --panel2:#1a212c;
  --line:#232c3a; --line2:#2e3a4d;
  --txt:#e8edf4; --mut:#8b97a8; --dim:#5c6778;
  --accent:#ff2e4d; --accent2:#ff5a3c; --gold:#ffcf4a;
  --good:#3ddc84; --blue:#3ea6ff;
  --mono:'Rajdhani',sans-serif; --sans:'Inter',sans-serif;
  --r:14px; --shadow:0 10px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); background:var(--bg); color:var(--txt);
  background-image:
    radial-gradient(1200px 500px at 80% -10%, rgba(255,46,77,.10), transparent 60%),
    radial-gradient(1000px 500px at 0% 10%, rgba(62,166,255,.06), transparent 55%);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:#fff}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 80px}

/* Header */
header{
  position:sticky;top:0;z-index:30;
  backdrop-filter:blur(14px); background:rgba(10,12,16,.72);
  border-bottom:1px solid var(--line); margin-bottom:26px;
}
.hd{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-weight:700;letter-spacing:2px;font-size:22px}
.logo .mk{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;box-shadow:0 6px 18px rgba(255,46,77,.4)}
.logo .mk svg{width:20px;height:20px}
.logo b{color:var(--accent)}
.grow{flex:1}
.btn{
  font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;
  border:1px solid var(--line2);background:var(--panel2);color:var(--txt);
  padding:10px 16px;border-radius:10px;transition:.16s;display:inline-flex;align-items:center;gap:8px
}
.btn:hover{border-color:var(--accent);color:#fff;transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 8px 22px rgba(255,46,77,.35)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn svg{width:16px;height:16px}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px}
.stat{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:18px}
.stat .k{font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--mut);font-weight:600}
.stat .v{font-family:var(--mono);font-weight:700;font-size:30px;margin-top:6px;line-height:1}
.stat .s{font-size:12px;color:var(--dim);margin-top:6px}
.stat .v.mono{font-variant-numeric:tabular-nums}
.stat.hl .v{color:var(--gold)}

/* Layout */
.grid{display:grid;grid-template-columns:1.55fr 1fr;gap:22px;align-items:start}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.card h2{font-family:var(--mono);font-weight:700;letter-spacing:1px;font-size:16px;text-transform:uppercase;
  padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.card .body{padding:18px}

/* Filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
select,input,textarea{
  font-family:var(--sans);font-size:14px;color:var(--txt);background:var(--panel2);
  border:1px solid var(--line2);border-radius:10px;padding:10px 12px;outline:none;transition:.16s;width:100%
}
select:focus,input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,46,77,.15)}
label{display:block;font-size:12px;color:var(--mut);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.field{margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Car picker */
.cars{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:6px}
.carcard{position:relative;border:1px solid var(--line2);border-radius:12px;overflow:hidden;cursor:pointer;background:var(--bg2);transition:.18s}
.carcard img{width:100%;height:88px;object-fit:cover;display:block;filter:saturate(1.05) contrast(1.03)}
.carcard .cn{padding:8px 10px;font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:.5px}
.carcard .cn small{display:block;color:var(--dim);font-family:var(--sans);font-weight:500;font-size:11px;text-transform:none;letter-spacing:0}
.carcard::after{content:"";position:absolute;inset:0;border-radius:12px;border:2px solid transparent;transition:.18s;pointer-events:none}
.carcard:hover{transform:translateY(-2px)}
.carcard.sel::after{border-color:var(--accent)}
.carcard.sel{box-shadow:0 8px 24px rgba(255,46,77,.28)}
.carcard .badge{position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;opacity:0;transition:.18s}
.carcard.sel .badge{opacity:1}

/* Time input */
.timegrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.timegrid .tf{text-align:center}
.timegrid input{text-align:center;font-family:var(--mono);font-size:22px;font-weight:700;padding:12px 6px;font-variant-numeric:tabular-nums}
.timegrid .tf small{display:block;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* Mode toggle */
.modeToggle{display:flex;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:3px}
.modeBtn{flex:1;font-family:var(--sans);font-weight:600;font-size:13px;padding:9px 8px;border:none;border-radius:8px;
  background:transparent;color:var(--mut);cursor:pointer;transition:.16s}
.modeBtn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(255,46,77,.3)}
.modeBtn:not(.on):hover{color:var(--txt)}
.countRow{display:flex;align-items:center;gap:14px}
.countRow input{width:110px;text-align:center;font-family:var(--mono);font-size:26px;font-weight:700;padding:12px 6px}
.countRow .cbtn{width:44px;height:44px;border-radius:10px;border:1px solid var(--line2);background:var(--panel2);
  color:var(--txt);font-size:20px;font-weight:700;cursor:pointer;flex-shrink:0;transition:.14s}
.countRow .cbtn:hover{border-color:var(--blue);color:var(--blue)}
.countRow .clabel{color:var(--mut);font-size:13px}
.cntbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(62,166,255,.14);color:var(--blue);
  font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px;letter-spacing:.2px}

/* Table */
.laps{width:100%;border-collapse:collapse;font-size:14px}
.laps th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);
  font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
.laps th:hover{color:var(--txt)}
.laps th .ar{opacity:.5;font-size:10px}
.laps td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.laps tr:last-child td{border-bottom:none}
.laps tbody tr{transition:.12s}
.laps tbody tr:hover{background:var(--panel2)}
.laps .tm{font-family:var(--mono);font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.pb{display:inline-flex;align-items:center;gap:5px;background:rgba(255,207,74,.14);color:var(--gold);
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}
.carpill{display:inline-flex;align-items:center;gap:8px}
.carpill img{width:34px;height:22px;object-fit:cover;border-radius:5px;border:1px solid var(--line2)}
.delta{font-family:var(--mono);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.delta.up{color:var(--good)} .delta.down{color:var(--accent)}
.del{color:var(--dim);cursor:pointer;background:none;border:none;font-size:16px;padding:4px 8px;border-radius:7px;transition:.14s}
.del:hover{color:var(--accent);background:rgba(255,46,77,.1)}
.note{color:var(--mut);font-size:13px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Chart */
.chartwrap{padding:8px 6px 4px}
#chart{width:100%;height:230px;display:block}
.chartlegend{display:flex;flex-wrap:wrap;gap:10px 16px;padding:6px 12px 12px}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut);cursor:pointer;user-select:none;transition:.14s}
.leg:hover{color:var(--txt)}
.leg.off{opacity:.35}
.leg i{width:12px;height:12px;border-radius:3px;display:inline-block}

/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--dim)}
.empty svg{width:48px;height:48px;opacity:.35;margin-bottom:14px}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(5,7,10,.7);backdrop-filter:blur(6px);z-index:50;display:none;place-items:center;padding:20px}
.modal.on{display:grid}
.modal .box{background:var(--panel);border:1px solid var(--line2);border-radius:16px;max-width:440px;width:100%;box-shadow:var(--shadow);overflow:hidden}
.modal h3{font-family:var(--mono);font-weight:700;letter-spacing:1px;padding:18px;border-bottom:1px solid var(--line);text-transform:uppercase;font-size:16px}
.modal .mb{padding:18px}
.modal .mf{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);
  border:1px solid var(--line2);border-left:3px solid var(--good);padding:12px 18px;border-radius:10px;
  font-size:14px;font-weight:500;box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:60;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.sub{color:var(--mut);font-size:13px;padding:0 18px 14px}
.mini{font-size:12px;color:var(--dim);margin-top:4px}
@media(max-width:900px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .hd{flex-wrap:wrap}
}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="logo">
      <span class="mk"><svg viewBox="0 0 24 24" fill="none"><path d="M5 18l4-12 3 9 2-6 5 9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      A<b>PEX</b>
    </div>
    <div class="grow"></div>
    <select id="trackSel" style="width:auto;min-width:200px"></select>
    <button class="btn ghost" id="exportBtn" title="Экспорт данных">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 15V3m0 12l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn primary" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>
      Записать круг
    </button>
  </div>
</header>

<div class="wrap">
  <div class="stats" id="stats"></div>

  <div class="grid">
    <!-- Laps table -->
    <div class="card">
      <h2><span class="dot"></span> Журнал кругов <span class="grow" style="flex:1"></span></h2>
      <div class="sub" id="tableSub">Все заезды на выбранной трассе, отсортированы по дате.</div>
      <div class="body" style="padding:0 0 6px">
        <div id="tableHost"></div>
      </div>
    </div>

    <!-- Progress chart -->
    <div class="card">
      <h2><span class="dot"></span> Прогресс</h2>
      <div class="chartwrap"><canvas id="chart"></canvas></div>
      <div class="chartlegend" id="legend"></div>
    </div>
  </div>
</div>

<!-- Add lap modal -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Новый круг</h3>
    <div class="mb">
      <div class="field">
        <label>Автомобиль</label>
        <div class="cars" id="carPicker"></div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Трасса</label>
          <select id="mTrack"></select>
        </div>
        <div class="field">
          <label>Дата</label>
          <input type="date" id="mDate">
        </div>
      </div>
      <div class="field">
        <label>Тип записи</label>
        <div class="modeToggle" id="modeToggle">
          <button type="button" class="modeBtn on" data-mode="timed">⏱ На время</button>
          <button type="button" class="modeBtn" data-mode="count">🔁 Просто круги</button>
        </div>
      </div>
      <div class="field" id="timeField">
        <label>Время круга</label>
        <div class="timegrid">
          <div class="tf"><input id="mMin" type="number" min="0" max="59" placeholder="0" inputmode="numeric"><small>мин</small></div>
          <div class="tf"><input id="mSec" type="number" min="0" max="59" placeholder="00" inputmode="numeric"><small>сек</small></div>
          <div class="tf"><input id="mMs" type="number" min="0" max="999" placeholder="000" inputmode="numeric"><small>мс</small></div>
        </div>
      </div>
      <div class="field" id="countField" style="display:none">
        <label>Сколько кругов проехал</label>
        <div class="countRow">
          <button type="button" class="cbtn" id="cntMinus">−</button>
          <input id="mCount" type="number" min="1" max="999" value="1" inputmode="numeric">
          <button type="button" class="cbtn" id="cntPlus">+</button>
          <span class="clabel">без хронометража, просто счётчик</span>
        </div>
      </div>
      <div class="mini" id="prevBest"></div>
      <div class="field">
        <label>Заметка <span style="text-transform:none;color:var(--dim)">(необязательно)</span></label>
        <input id="mNote" placeholder="Например: мокрая трасса, новая резина…">
      </div>
    </div>
    <div class="mf">
      <button class="btn ghost" id="cancelBtn">Отмена</button>
      <button class="btn primary" id="saveBtn">Сохранить круг</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- Data ---------- */
const CARS = [
  {id:'ae86',  name:'Toyota AE86',   full:'Sprinter Trueno · 4A-GE', img:'assets/cars/ae86.jpg',  color:'#ffcf4a'},
  {id:'rx7',   name:'Mazda RX-7',    full:'FD3S · 13B-REW Rotary',   img:'assets/cars/rx7.jpg',   color:'#ff2e4d'},
  {id:'gtr34', name:'Nissan GT-R R34',full:'BNR34 · RB26DETT',       img:'assets/cars/gtr34.jpg', color:'#3ea6ff'},
  {id:'supra', name:'Toyota Supra',  full:'JZA80 · 2JZ-GTE',         img:'assets/cars/supra.jpg', color:'#3ddc84'},
  {id:'alfa155',name:'Alfa Romeo 155',full:'V6 TI · DTM · 2.5L V6',   img:'assets/cars/alfa155.jpg',color:'#a678ff'},
];
const TRACKS = [
  {id:'nords', name:'Nürburgring Nordschleife', len:'20.8 км'},
];
const carById = id => CARS.find(c=>c.id===id);
const trackById = id => TRACKS.find(t=>t.id===id);

const LS='apex_laps_v1', LST='apex_track';
let laps = load();
let curTrack = localStorage.getItem(LST) || TRACKS[0].id;
let sortKey='date', sortDir=-1;
let selCar = CARS[0].id;
let hidden = new Set(); // hidden cars on chart
let mode = 'timed'; // 'timed' | 'count'

function ruLapsWord(n){
  const n10=n%10, n100=n%100;
  if(n100>=11&&n100<=14) return 'кругов';
  if(n10===1) return 'круг';
  if(n10>=2&&n10<=4) return 'круга';
  return 'кругов';
}
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function lapCount(l){ return l.ms!=null ? 1 : (l.count||1); }

function load(){ try{return JSON.parse(localStorage.getItem(LS))||[]}catch(e){return []} }
function save(){ localStorage.setItem(LS, JSON.stringify(laps)); }

/* ---------- Time helpers ---------- */
function fmt(ms){
  if(ms==null) return '—';
  const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), t=ms%1000;
  return `${m}:${String(s).padStart(2,'0')}.${String(t).padStart(3,'0')}`;
}
function fmtDelta(ms){
  const sign = ms<0?'−':'+';
  const a=Math.abs(ms), s=Math.floor(a/1000), t=a%1000;
  return `${sign}${s}.${String(t).padStart(3,'0')}`;
}
function ruDate(iso){
  const d=new Date(iso+'T00:00');
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
}

/* ---------- Render tracks ---------- */
function fillTracks(){
  const opts = TRACKS.map(t=>`<option value="${t.id}">${t.name} · ${t.len}</option>`).join('');
  trackSel.innerHTML=opts; mTrack.innerHTML=opts;
  trackSel.value=curTrack; mTrack.value=curTrack;
}

/* ---------- Stats ---------- */
function trackLaps(){ return laps.filter(l=>l.track===curTrack); }

function renderStats(){
  const tl = trackLaps();
  const total = tl.reduce((s,l)=>s+lapCount(l),0);
  const timed = tl.filter(l=>l.ms!=null);
  const best = timed.length ? Math.min(...timed.map(l=>l.ms)) : null;
  const bestLap = timed.find(l=>l.ms===best);
  // best car (by lap count)
  const byCar={}; tl.forEach(l=>byCar[l.car]=(byCar[l.car]||0)+lapCount(l));
  const favId = Object.keys(byCar).sort((a,b)=>byCar[b]-byCar[a])[0];
  // improvement: first vs best chronologically (timed laps only)
  const chrono=[...timed].sort((a,b)=>a.date.localeCompare(b.date));
  let improv=null;
  if(chrono.length>1){ improv = chrono[0].ms - best; }

  stats.innerHTML = `
    <div class="stat"><div class="k">Всего кругов</div><div class="v mono">${total}</div><div class="s">на этой трассе</div></div>
    <div class="stat hl"><div class="k">Лучший круг</div><div class="v mono">${best!=null?fmt(best):'—'}</div><div class="s">${bestLap?carById(bestLap.car).name:'—'}</div></div>
    <div class="stat"><div class="k">Прогресс</div><div class="v mono" style="color:${improv>0?'var(--good)':'var(--txt)'}">${improv!=null&&improv>0?'−'+fmtDelta(improv).slice(1):'—'}</div><div class="s">${favId?'фаворит: '+carById(favId).name:'нет данных'}</div></div>
  `;
}

/* ---------- Table ---------- */
function bestPerCar(tl){
  const m={}; tl.forEach(l=>{ if(l.ms==null) return; if(m[l.car]==null||l.ms<m[l.car]) m[l.car]=l.ms; }); return m;
}
function renderTable(){
  const tl = trackLaps();
  const host = document.getElementById('tableHost');
  if(!tl.length){
    host.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <div>Пока нет ни одного круга.<br>Нажми «Записать круг», чтобы начать.</div></div>`;
    return;
  }
  const pb = bestPerCar(tl);
  const sorted=[...tl].sort((a,b)=>{
    let r=0;
    if(sortKey==='date') r=a.date.localeCompare(b.date)*sortDir;
    else if(sortKey==='time'){
      if(a.ms==null && b.ms==null) r=0;
      else if(a.ms==null) return 1;
      else if(b.ms==null) return -1;
      else r=(a.ms-b.ms)*sortDir;
    }
    else if(sortKey==='car') r=carById(a.car).name.localeCompare(carById(b.car).name)*sortDir;
    return r;
  });
  // delta vs previous chronological lap in same car (timed laps only)
  const chronoByCar={};
  [...tl].filter(l=>l.ms!=null).sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>{
    (chronoByCar[l.car]=chronoByCar[l.car]||[]).push(l);
  });
  const prevMap={};
  Object.values(chronoByCar).forEach(arr=>arr.forEach((l,i)=>{ if(i>0) prevMap[l.id]=l.ms-arr[i-1].ms; }));

  const ar = k => sortKey===k ? (sortDir>0?'▲':'▼') : '';
  const rows = sorted.map(l=>{
    const c=carById(l.car); const isPB = l.ms!=null && l.ms===pb[l.car];
    const d = prevMap[l.id];
    const dHtml = d==null?'<span style="color:var(--dim)">—</span>':
      `<span class="delta ${d<0?'up':'down'}">${fmtDelta(d)}</span>`;
    const timeCell = l.ms!=null
      ? `<span class="tm">${fmt(l.ms)}</span>${isPB?'<span class="pb">★ PB</span>':''}`
      : `<span class="cntbadge">🔁 × ${l.count||1}</span>`;
    return `<tr>
      <td style="color:var(--mut);white-space:nowrap">${ruDate(l.date)}</td>
      <td><span class="carpill"><img src="${c.img}" alt="">${c.name}</span></td>
      <td>${timeCell}</td>
      <td>${dHtml}</td>
      <td class="note" title="${(l.note||'').replace(/"/g,'&quot;')}">${l.note||'<span style="color:var(--dim)">—</span>'}</td>
      <td style="text-align:right"><button class="del" data-id="${l.id}" title="Удалить">✕</button></td>
    </tr>`;
  }).join('');

  host.innerHTML = `<table class="laps">
    <thead><tr>
      <th data-k="date">Дата <span class="ar">${ar('date')}</span></th>
      <th data-k="car">Авто <span class="ar">${ar('car')}</span></th>
      <th data-k="time">Время <span class="ar">${ar('time')}</span></th>
      <th>Δ к прошлому</th>
      <th>Заметка</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody></table>`;

  host.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir = k==='time'?1:-1;}
    renderTable();
  });
  host.querySelectorAll('.del').forEach(b=>b.onclick=()=>{
    laps=laps.filter(x=>x.id!==b.dataset.id); save(); renderAll(); toast('Круг удалён');
  });
}

/* ---------- Chart ---------- */
function renderLegend(){
  const tl=trackLaps();
  const present = CARS.filter(c=>tl.some(l=>l.car===c.id));
  legend.innerHTML = present.map(c=>
    `<span class="leg ${hidden.has(c.id)?'off':''}" data-id="${c.id}"><i style="background:${c.color}"></i>${c.name}</span>`
  ).join('') || '<span style="color:var(--dim);font-size:12px">Нет данных для графика</span>';
  legend.querySelectorAll('.leg').forEach(el=>el.onclick=()=>{
    const id=el.dataset.id; hidden.has(id)?hidden.delete(id):hidden.add(id);
    renderLegend(); drawChart();
  });
}
function drawChart(){
  const cv=document.getElementById('chart');
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth, H=230;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const tl=trackLaps().filter(l=>!hidden.has(l.car) && l.ms!=null);
  const pad={l:56,r:14,t:16,b:28};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;

  if(tl.length<1){
    ctx.fillStyle='#5c6778'; ctx.font='13px Inter'; ctx.textAlign='center';
    ctx.fillText('Добавь круги на время, чтобы увидеть динамику', W/2, H/2);
    return;
  }
  const times=tl.map(l=>l.ms);
  let min=Math.min(...times), max=Math.max(...times);
  if(min===max){min-=2000;max+=2000;}
  const padY=(max-min)*0.12; min-=padY; max+=padY;
  const dates=[...new Set(tl.map(l=>l.date))].sort();
  const t0=new Date(dates[0]+'T00:00').getTime();
  const t1=new Date(dates[dates.length-1]+'T00:00').getTime();
  const span=Math.max(t1-t0,1);
  const X=d=>pad.l + (span? ((new Date(d+'T00:00').getTime()-t0)/span):0.5)*iw;
  const Y=v=>pad.t + (1-(v-min)/(max-min))*ih;

  // grid + Y labels (time)
  ctx.strokeStyle='#232c3a'; ctx.fillStyle='#5c6778'; ctx.font='11px Rajdhani'; ctx.textAlign='right';
  for(let i=0;i<=4;i++){
    const v=min+(max-min)*i/4, y=Y(v);
    ctx.globalAlpha=.5; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke(); ctx.globalAlpha=1;
    ctx.fillText(fmt(Math.round(v)), pad.l-8, y+4);
  }
  // X date labels
  ctx.textAlign='center';
  const showDates = dates.length>6 ? [dates[0],dates[Math.floor(dates.length/2)],dates[dates.length-1]] : dates;
  showDates.forEach(d=>{
    ctx.fillStyle='#5c6778';
    ctx.fillText(new Date(d+'T00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}), X(d), H-8);
  });

  // per-car lines
  const present=CARS.filter(c=>tl.some(l=>l.car===c.id));
  present.forEach(c=>{
    const pts=tl.filter(l=>l.car===c.id).sort((a,b)=>a.date.localeCompare(b.date));
    if(!pts.length) return;
    ctx.strokeStyle=c.color; ctx.lineWidth=2.4; ctx.lineJoin='round';
    ctx.shadowColor=c.color; ctx.shadowBlur=8;
    ctx.beginPath();
    pts.forEach((p,i)=>{ const x=X(p.date),y=Y(p.ms); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke(); ctx.shadowBlur=0;
    pts.forEach(p=>{
      const x=X(p.date),y=Y(p.ms);
      ctx.fillStyle='#0a0c10'; ctx.beginPath(); ctx.arc(x,y,4.5,0,7); ctx.fill();
      ctx.fillStyle=c.color; ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill();
    });
  });
}

/* ---------- Modal ---------- */
function openModal(){
  fillTracks(); mTrack.value=curTrack;
  mDate.value=new Date().toISOString().slice(0,10);
  mMin.value=''; mSec.value=''; mMs.value=''; mNote.value=''; mCount.value=1;
  selCar = CARS[0].id;
  setMode('timed');
  renderCarPicker(); updatePrevBest();
  modal.classList.add('on'); setTimeout(()=>mMin.focus(),50);
}
function closeModal(){ modal.classList.remove('on'); }
function setMode(m){
  mode=m;
  modeToggle.querySelectorAll('.modeBtn').forEach(b=>b.classList.toggle('on', b.dataset.mode===m));
  timeField.style.display = m==='timed' ? '' : 'none';
  countField.style.display = m==='count' ? '' : 'none';
  setTimeout(()=>{ (m==='timed'?mMin:mCount).focus(); }, 30);
}
function renderCarPicker(){
  carPicker.innerHTML = CARS.map(c=>`
    <div class="carcard ${c.id===selCar?'sel':''}" data-id="${c.id}">
      <span class="badge">✓ Выбрано</span>
      <img src="${c.img}" alt="${c.name}">
      <div class="cn">${c.name}<small>${c.full}</small></div>
    </div>`).join('');
  carPicker.querySelectorAll('.carcard').forEach(el=>el.onclick=()=>{
    selCar=el.dataset.id; renderCarPicker(); updatePrevBest();
  });
}
function updatePrevBest(){
  const tid=mTrack.value;
  const rel=laps.filter(l=>l.track===tid && l.car===selCar);
  const timedRel=rel.filter(l=>l.ms!=null);
  const totalCount=rel.reduce((s,l)=>s+lapCount(l),0);
  let parts=[];
  if(timedRel.length){
    const b=Math.min(...timedRel.map(l=>l.ms));
    parts.push(`рекорд: <b style="color:var(--gold)">${fmt(b)}</b>`);
  }
  if(totalCount) parts.push(`всего кругов: <b style="color:var(--txt)">${totalCount}</b>`);
  prevBest.innerHTML = parts.length ? `${carById(selCar).name} — ${parts.join(' · ')}` : 'Первый круг на этой машине здесь!';
}
function saveLap(){
  if(mode==='timed'){
    const m=+mMin.value||0, s=+mSec.value||0, ms=+mMs.value||0;
    if(s>59||ms>999){ toast('Секунды ≤ 59, миллисекунды ≤ 999',true); return; }
    const total=m*60000+s*1000+ms;
    if(total<=0){ toast('Введи время круга',true); return; }
    const prevBestMs = (()=>{const r=laps.filter(l=>l.track===mTrack.value&&l.car===selCar&&l.ms!=null);return r.length?Math.min(...r.map(l=>l.ms)):null;})();
    laps.push({id:genId(), car:selCar, track:mTrack.value, date:mDate.value, ms:total, count:1, note:mNote.value.trim()});
    save();
    curTrack=mTrack.value; trackSel.value=curTrack; localStorage.setItem(LST,curTrack);
    closeModal(); renderAll();
    if(prevBestMs!=null && total<prevBestMs) toast(`🏆 Новый рекорд! На ${fmtDelta(total-prevBestMs).slice(1)} с быстрее`);
    else toast('Круг записан');
  } else {
    const cnt = Math.max(1, Math.min(999, Math.round(+mCount.value)||1));
    laps.push({id:genId(), car:selCar, track:mTrack.value, date:mDate.value, ms:null, count:cnt, note:mNote.value.trim()});
    save();
    curTrack=mTrack.value; trackSel.value=curTrack; localStorage.setItem(LST,curTrack);
    closeModal(); renderAll();
    toast(`Записано ${cnt} ${ruLapsWord(cnt)} без времени`);
  }
}

/* ---------- Toast ---------- */
let tT;
function toast(msg,bad){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.borderLeftColor=bad?'var(--accent)':'var(--good)';
  el.classList.add('on'); clearTimeout(tT); tT=setTimeout(()=>el.classList.remove('on'),2600);
}

/* ---------- Export ---------- */
function exportData(){
  const tl=trackLaps();
  if(!tl.length){ toast('Нет данных для экспорта',true); return; }
  let csv='Дата,Авто,Трасса,Время,мс,Кругов,Заметка\n';
  tl.sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>{
    const timeStr = l.ms!=null ? fmt(l.ms) : 'без времени';
    csv+=`${l.date},"${carById(l.car).name}","${trackById(l.track).name}",${timeStr},${l.ms!=null?l.ms:''},${lapCount(l)},"${(l.note||'').replace(/"/g,'""')}"\n`;
  });
  const blob=new Blob(['﻿'+csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`apex-${trackById(curTrack).id}-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  toast('CSV экспортирован');
}

/* ---------- Wire up ---------- */
function renderAll(){ renderStats(); renderTable(); renderLegend(); drawChart(); }
addBtn.onclick=openModal;
cancelBtn.onclick=closeModal;
saveBtn.onclick=saveLap;
exportBtn.onclick=exportData;
trackSel.onchange=()=>{curTrack=trackSel.value; localStorage.setItem(LST,curTrack); hidden.clear(); renderAll();};
mTrack.onchange=updatePrevBest;
modeToggle.querySelectorAll('.modeBtn').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
cntMinus.onclick=()=>{ mCount.value=Math.max(1,(+mCount.value||1)-1); };
cntPlus.onclick=()=>{ mCount.value=Math.min(999,(+mCount.value||1)+1); };
modal.onclick=e=>{if(e.target===modal)closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&modal.classList.contains('on'))saveLap();});
window.addEventListener('resize',()=>{clearTimeout(window._r);window._r=setTimeout(drawChart,120);});

fillTracks();
renderAll();
</script>
